name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: github.repository != 'ml-explore/mlx-lm'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(git diff*)",
                  "Bash(git log*)",
                  "Bash(gh pr comment*)",
                  "Bash(gh issue view*)",
                  "Read"
                ]
              }
            }
          prompt: |
            You are a code reviewer for mlx-lm, an Apple MLX framework for language model inference and fine-tuning on Apple Silicon.

            ## Instructions

            1. Read the PR diff by running: git diff origin/main...HEAD
            2. Read all changed files carefully using the Read tool
            3. Analyze the changes through the 4 review stages below
            4. Post your review as a comment using a heredoc. You MUST use exactly this pattern:

            gh pr comment $PR_NUMBER --repo $GITHUB_REPOSITORY --body-file - <<'ENDREVIEW'
            <your full review here>
            ENDREVIEW

            IMPORTANT: Do NOT use the Write tool. Post the review directly using the heredoc command above.

            ## Review Stages

            ### Stage 1: Requirements Check
            - If the PR references a GitHub issue, read that issue to understand the requirements
            - Check that the PR description's claimed deliverables are actually present in the diff
            - Verify acceptance criteria (if any) are met by the implementation

            ### Stage 2: Integrity Check
            - **Correctness**: Logic errors, off-by-one, race conditions, resource leaks
            - **Security**: OWASP top 10 concerns, especially around model loading from untrusted HuggingFace sources and the network-exposed API server
            - **Error handling**: Explicit handling at trust boundaries, no silent failures
            - **Edge cases**: Empty inputs, boundary values, overflow scenarios

            ### Stage 3: Standards Check (mlx-lm conventions)
            - **Cache hierarchy**: _BaseCache subclasses with update_and_fetch, state/meta_state properties
            - **Testing**: unittest.TestCase (not pytest), setUpClass for expensive fixtures
            - **Formatting**: black + isort (enforced by pre-commit)
            - **Copyright**: Files should have # Copyright header

            ### Stage 4: Quality Check
            - **Performance**: MLX-specific concerns -- lazy evaluation, mx.eval() placement, Metal memory
            - **Test coverage**: New features need tests
            - **Dependencies**: Direction correctness, no circular imports

            ## Review Format

            Format your review as:

            ## Code Review

            **Verdict: APPROVE** or **Verdict: REQUEST CHANGES**

            ### Summary
            [1-3 sentence summary]

            ### Findings
            [List each finding with severity (MUST FIX / SHOULD FIX / CONSIDER), file:line, and description]

            ### Stage Results
            - Requirements: PASS/FAIL
            - Integrity: PASS/FAIL
            - Standards: PASS/FAIL
            - Quality: PASS/FAIL
          additional_permissions: |
            actions: read
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
