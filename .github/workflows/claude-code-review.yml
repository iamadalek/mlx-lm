name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: github.repository != 'ml-explore/mlx-lm'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request using /structured-workflows:review.

            This command will:
            1. Resolve project context from .claude/workflow.yaml
            2. Review the PR diff against the requirements-check, integrity-check, standards-check, and quality-check stages
            3. Produce a PASS/BLOCK verdict with severity-tiered findings

            If no brief or issue is linked, review the PR based on its description and the diff against the base branch.

            Post your review findings as a PR review (not a comment). Use "APPROVE" for PASS verdicts and "REQUEST_CHANGES" for BLOCK verdicts.
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,Agent,Skill"
