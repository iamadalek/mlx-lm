name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: github.repository != 'ml-explore/mlx-lm'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          show_full_output: true
          prompt: |
            Review this pull request. Read all changed files and analyze them for:

            1. Code correctness and potential bugs
            2. API design and consistency with the existing codebase
            3. Test coverage for new functionality
            4. Edge cases and error handling
            5. Performance considerations

            Provide your review as a structured summary.
          additional_permissions: |
            actions: read
