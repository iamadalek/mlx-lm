name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: github.repository != 'ml-explore/mlx-lm'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          show_full_output: true
          prompt: |
            You are a code reviewer for mlx-lm, an Apple MLX framework for language model inference and fine-tuning on Apple Silicon.

            ## Review Protocol

            Review this PR through 4 review stages, reading all changed files carefully.

            ### Stage 1: Requirements Check
            - If the PR references a GitHub issue, read that issue to understand the requirements
            - Check that the PR description's claimed deliverables are actually present in the diff
            - Verify acceptance criteria (if any) are met by the implementation

            ### Stage 2: Integrity Check
            - **Correctness**: Logic errors, off-by-one, race conditions, resource leaks
            - **Security**: OWASP top 10 concerns, especially around model loading from untrusted HuggingFace sources (`mlx_lm/utils.py`) and the network-exposed OpenAI-compatible API server (`mlx_lm/server.py`)
            - **Error handling**: Explicit handling at trust boundaries, no silent failures
            - **Edge cases**: Empty inputs, boundary values, overflow scenarios

            ### Stage 3: Standards Check (mlx-lm conventions)
            - **Module organization**: Dynamic CLI routing via `importlib` in `cli.py`, `main()` entry points
            - **Configuration**: `@dataclass` pattern for config (ModelArgs, TrainingArgs)
            - **Model structure**: Attention -> MLP -> TransformerBlock -> Model composition
            - **Cache hierarchy**: `_BaseCache` subclasses (KVCache, RotatingKVCache, QuantizedKVCache) with `update_and_fetch`, `state`/`meta_state` properties
            - **Testing**: `unittest.TestCase` (not pytest), `setUpClass` for expensive fixtures, `MagicMock` for MLX layers, batch-mode verification
            - **Formatting**: black + isort (enforced by pre-commit)
            - **Copyright**: Files should have `# Copyright` header

            ### Stage 4: Quality Check
            - **API design**: Public surface consistency with `mlx_lm/__init__.py` exports
            - **Performance**: MLX-specific concerns -- lazy evaluation, `mx.eval()` placement, Metal memory (`mx.clear_cache()`), array operations efficiency
            - **Test coverage**: New features need tests; check unit + integration coverage
            - **Dependencies**: Direction correctness, no circular imports

            ## Severity Classification

            Classify each finding as:
            - **MUST FIX**: Bugs, security issues, data loss risk, API contract violations
            - **SHOULD FIX**: Convention violations, missing tests, performance issues
            - **CONSIDER**: Style suggestions, minor improvements, documentation gaps

            ## Output Format

            Post your review as a PR review with the following structure:

            ```
            ## Code Review

            **Verdict: APPROVE** or **Verdict: REQUEST CHANGES**

            ### Summary
            [1-3 sentence summary of the PR and overall assessment]

            ### Findings
            [List each finding with severity, file:line, and description]

            ### Stage Results
            - Requirements: PASS/FAIL
            - Integrity: PASS/FAIL
            - Standards: PASS/FAIL
            - Quality: PASS/FAIL
            ```

            Use APPROVE if no MUST FIX findings. Use REQUEST_CHANGES if any MUST FIX findings exist.
          additional_permissions: |
            actions: read
